name: Bug report
description: Report a reproducible issue
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Do not paste credentials, API keys, or private data.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: The prompt or command, and what you clicked.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node.js version, and browser.
    validations:
      required: false
